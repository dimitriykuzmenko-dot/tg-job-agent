name: Job Agent

on:
  schedule:
    # Каждые 30 минут. GitHub может задерживать запуск на 5-15 минут — это нормально.
    - cron: "*/30 * * * *"
  workflow_dispatch: {}  # кнопка ручного запуска во вкладке Actions

permissions:
  contents: write  # нужно, чтобы коммитить state.json обратно

concurrency:
  group: job-agent
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install requests beautifulsoup4

      - name: Run checker
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          HH_API_TOKEN: ${{ secrets.HH_API_TOKEN }}
          HH_CLIENT_ID: ${{ secrets.HH_CLIENT_ID }}
          HH_CLIENT_SECRET: ${{ secrets.HH_CLIENT_SECRET }}
        run: python checker.py

      - name: Commit state
        run: |
          git config user.name "job-agent-bot"
          git config user.email "actions@github.com"
          git add state.json
          git diff --cached --quiet || git commit -m "update state [skip ci]"
          git push

